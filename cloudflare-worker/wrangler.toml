name = "day-manager-worker"
main = "src/index.js"
compatibility_date = "2026-03-25"

[assets]
directory = ".."
binding = "ASSETS"
run_worker_first = ["/api/*", "/auth/*"]

[[kv_namespaces]]
binding = "DM_STORE"
id = "bc707384b6ef4423a50a65649a473e03"
preview_id = "b29b9d3ea44d45bfb22e188417897e86"

[vars]
SYNC_INTERVAL_MINUTES = "15"
SYNC_LOOKAHEAD_DAYS = "30"

[triggers]
crons = ["*/15 * * * *"]
